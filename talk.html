<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Connect - Executive Edition</title>
    <style>
        :root { --bg: #FDFBF7; --navy: #1A2A6C; --gold: #C5A059; --accent: #B21F1F; }
        body { font-family: 'Times New Roman', serif; background: var(--bg); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; color: #2C3E50; }
        .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; height: 100vh; }
        .header { background: var(--navy); color: var(--gold); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 12px; font-weight: bold; letter-spacing: 3px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 2px solid var(--gold); }
        
        /* 操作ボタン */
        .controls { display: grid; grid-template-columns: 2fr 1.2fr; gap: 10px; margin-bottom: 12px; }
        .mic-btn { padding: 18px; border-radius: 40px; border: none; background: linear-gradient(135deg, var(--navy), #2a3a7c); color: var(--gold); font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 5px 15px rgba(26,42,108,0.3); }
        .mic-btn.active { animation: blink 1.5s infinite; background: #333; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .stop-btn { padding: 18px; border-radius: 40px; border: none; background: var(--accent); color: white; font-size: 14px; font-weight: bold; cursor: pointer; display: none; align-items: center; justify-content: center; gap: 5px; box-shadow: 0 5px 10px rgba(178,31,31,0.2); }

        .card { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #E8E2D6; margin-bottom: 10px; }
        .label { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        #capturedText { font-size: 18px; line-height: 1.6; min-height: 50px; color: #333; }
        
        /* 国旗付きボタン */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .lang-btn { background: #F9F7F2; border: 1px solid #D1C7B7; color: var(--navy); font-size: 11px; padding: 12px 5px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .lang-btn:active { background: var(--gold); color: white; }
        .lang-btn span { font-size: 28px; }

        .result-card { border-top: 4px solid var(--gold); flex-grow: 1; min-height: 120px; display: flex; flex-direction: column; }
        #translatedDisplay { font-size: 24px; font-weight: bold; color: var(--navy); line-height: 1.4; flex-grow: 1; overflow-y: auto; }
        
        .footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid #F0EAE0; }
        .audio-btn { background: var(--gold); color: white; border: none; padding: 12px 35px; border-radius: 40px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(197,160,89,0.3); }
        .status { font-size: 10px; color: #A09686; text-align: center; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">GLOBAL CONNECT</div>
    
    <div class="controls">
        <button id="micBtn" class="mic-btn">🎙️ SPEAK</button>
        <button id="stopBtn" class="stop-btn">🛑 STOP</button>
    </div>

    <div class="card">
        <span class="label">INPUT</span>
        <div id="capturedText">....</div>
        <button onclick="clearT()" style="font-size:10px; margin-top:10px; border:1px solid #ccc; background:none; color:#999; padding:2px 8px; border-radius:4px;">クリア</button>
    </div>

    <div class="card">
        <span class="label">TRANSLATE TO</span>
        <div class="grid">
            <button class="lang-btn" onclick="translateTo('ja')"><span>🇯🇵</span> JAPAN</button>
            <button class="lang-btn" onclick="translateTo('vi')"><span>🇻🇳</span> VIETNAM</button>
            <button class="lang-btn" onclick="requestEnglish()"><span>🇺🇸</span> ENGLISH</button>
        </div>
    </div>

    <div class="card result-card">
        <span class="label">TRANSLATION</span>
        <div id="translatedDisplay">....</div>
        <div class="footer">
            <span id="st" class="status">READY</span>
            <button class="audio-btn" onclick="replay()">🔊 REPLAY</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby_T8EAdI7du4c7GwRnVZcHUh2yje_j5Cp79C8XGtPqSw7GpTKTfA0oLJ6TK8TbGesiZQ/exec";
    const micBtn = document.getElementById('micBtn'), stopBtn = document.getElementById('stopBtn'), capturedText = document.getElementById('capturedText'), translatedDisplay = document.getElementById('translatedDisplay'), st = document.getElementById('st');
    let lastT = "", lastL = "", recognition, currentFinal = '';

    function clearT() { currentFinal = ''; capturedText.innerText = '....'; }

    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.interimResults = true;
    recognition.continuous = true;

    recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; ++i) {
            if (e.results[i].isFinal) currentFinal += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
        }
        capturedText.innerText = currentFinal + interim;
    };

    recognition.onend = () => { if (micBtn.classList.contains('active')) recognition.start(); };

    micBtn.onclick = () => {
        clearT();
        recognition.lang = (lastL === 'vi') ? 'vi-VN' : (lastL === 'en') ? 'en-US' : 'ja-JP';
        try {
            recognition.start();
            micBtn.classList.add('active');
            stopBtn.style.display = "flex";
            micBtn.innerText = "🎙️ LISTENING...";
            st.innerText = "ACTIVE";
        } catch (err) {}
    };

    stopBtn.onclick = () => {
        micBtn.classList.remove('active');
        recognition.stop();
        stopBtn.style.display = "none";
        micBtn.innerText = "🎙️ SPEAK";
        st.innerText = "CAPTURED";
    };

    function translateTo(lang) {
        const text = capturedText.innerText;
        if (!text || text === "....") return;
        st.innerText = "CONNECTING...";
        
        window.cb = (data) => {
            lastT = data.result; lastL = lang;
            translatedDisplay.innerText = lastT; st.innerText = "DONE";
            replay();
            const old = document.getElementById('api-script');
            if (old) old.remove();
            delete window.cb;
        };

        const script = document.createElement('script');
        script.id = 'api-script';
        script.src = `${GAS_URL}?text=${encodeURIComponent(text)}&target=${lang}&callback=cb`;
        document.body.appendChild(script);
    }

    function requestEnglish() { translateTo('en'); }

    function replay() {
        if (!lastT) return;
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const uttr = new SpeechSynthesisUtterance(lastT);
            uttr.lang = (lastL === 'vi') ? 'vi-VN' : (lastL === 'en') ? 'en-US' : 'ja-JP';
            const voices = window.speechSynthesis.getVoices();
            const voice = voices.find(v => v.lang.startsWith(uttr.lang.split('-')[0]));
            if (voice) uttr.voice = voice;
            uttr.rate = 0.9;
            window.speechSynthesis.speak(uttr);
        }, 200);
    }
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
