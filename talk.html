<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Connect - Executive</title>
    <style>
        :root { --bg: #FDFBF7; --navy: #1A2A6C; --gold: #C5A059; --accent: #B21F1F; }
        body { font-family: 'Times New Roman', serif; background: var(--bg); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; color: #2C3E50; }
        .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; height: 100vh; }
        .header { background: var(--navy); color: var(--gold); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 12px; font-weight: bold; letter-spacing: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 2px solid var(--gold); }
        .controls { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 12px; }
        .btn { padding: 18px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .mic-btn { background: var(--navy); color: var(--gold); font-size: 16px; }
        .mic-btn.active { background: #333; color: #fff; animation: pulse 1.5s infinite; }
        .stop-btn { background: var(--accent); color: white; display: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .card { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #E8E2D6; margin-bottom: 10px; }
        .label { font-size: 10px; color: var(--gold); font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
        #capturedText { font-size: 18px; min-height: 50px; color: #333; line-height: 1.5; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .lang-btn { background: #F9F7F2; border: 1px solid #D1C7B7; color: var(--navy); padding: 12px 5px; border-radius: 10px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .lang-btn span { font-size: 28px; }
        .result-card { border-top: 4px solid var(--gold); flex-grow: 1; display: flex; flex-direction: column; }
        #translatedDisplay { font-size: 24px; font-weight: bold; color: var(--navy); line-height: 1.4; flex-grow: 1; overflow-y: auto; }
        .footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid #F0EAE0; }
        .audio-btn { background: var(--gold); color: white; border: none; padding: 12px 35px; border-radius: 40px; font-weight: bold; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">GLOBAL CONNECT</div>
    <div class="controls">
        <button id="micBtn" class="btn mic-btn">🎙️ SPEAK</button>
        <button id="stopBtn" class="btn stop-btn">🛑 STOP</button>
    </div>
    <div class="card"><span class="label">INPUT</span><div id="capturedText">....</div></div>
    <div class="card"><span class="label">TRANSLATE TO</span>
        <div class="grid">
            <button class="lang-btn" onclick="go('ja')"><span>🇯🇵</span> JAPAN</button>
            <button class="lang-btn" onclick="go('vi')"><span>🇻🇳</span> VIETNAM</button>
            <button class="lang-btn" onclick="go('en')"><span>🇺🇸</span> ENGLISH</button>
        </div>
    </div>
    <div class="card result-card">
        <span class="label">TRANSLATION</span><div id="translatedDisplay">....</div>
        <div class="footer"><span id="st" style="font-size:10px; color:#999;">READY</span><button class="audio-btn" onclick="replay()">🔊 REPLAY</button></div>
    </div>
</div>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby_T8EAdI7du4c7GwRnVZcHUh2yje_j5Cp79C8XGtPqSw7GpTKTfA0oLJ6TK8TbGesiZQ/exec";
    const micBtn = document.getElementById('micBtn'), stopBtn = document.getElementById('stopBtn'), capturedText = document.getElementById('capturedText'), translatedDisplay = document.getElementById('translatedDisplay'), st = document.getElementById('st');
    let lastT = "", lastL = "", recognition, finalT = '';

    const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
    recognition = new SR(); recognition.interimResults = true; recognition.continuous = true;
    recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; ++i) {
            if (e.results[i].isFinal) finalT += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
        }
        capturedText.innerText = finalT + interim;
    };
    recognition.onend = () => { if (micBtn.classList.contains('active')) recognition.start(); };

    micBtn.onclick = () => {
        finalT = ''; capturedText.innerText = '....';
        recognition.lang = (lastL === 'vi') ? 'vi-VN' : (lastL === 'en') ? 'en-US' : 'ja-JP';
        recognition.start(); micBtn.classList.add('active'); stopBtn.style.display = "flex";
    };

    stopBtn.onclick = () => {
        micBtn.classList.remove('active'); recognition.stop(); stopBtn.style.display = "none";
    };

    function go(L) {
        const text = capturedText.innerText;
        if (!text || text === "....") return;
        st.innerText = "CONNECTING...";
        
        window.cb = (data) => {
            lastT = data.result; lastL = L;
            translatedDisplay.innerText = lastT; st.innerText = "DONE";
            replay(); delete window.cb;
            if(document.getElementById('api')) document.getElementById('api').remove();
        };

        const s = document.createElement('script');
        s.id = 'api';
        s.src = GAS_URL + "?text=" + encodeURIComponent(text) + "&target=" + L + "&callback=cb";
        document.body.appendChild(s);
    }

    function replay() {
        if (!lastT) return;
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const u = new SpeechSynthesisUtterance(lastT);
            u.lang = (lastL === 'vi') ? 'vi-VN' : (lastL === 'ja') ? 'ja-JP' : 'en-US';
            const v = window.speechSynthesis.getVoices().find(v => v.lang.startsWith(u.lang.split('-')[0]));
            if (v) u.voice = v;
            u.rate = 0.9; window.speechSynthesis.speak(u);
        }, 200);
    }
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
