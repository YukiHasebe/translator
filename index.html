<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Connect - Privilege Edition</title>
    <style>
        :root {
            --bg-base: #FDFBF7;
            --navy-deep: #1A2A6C;
            --gold-accent: #C5A059;
            --text-main: #2C3E50;
            --card-white: #FFFFFF;
        }

        body {
            font-family: 'Times New Roman', "Hiragino Mincho ProN", serif;
            background-color: var(--bg-base);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
        }

        .header {
            padding: 20px;
            text-align: center;
            background: var(--navy-deep);
            color: var(--gold-accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; }

        .main-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .card {
            background: var(--card-white);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #E8E2D6;
        }

        .label {
            font-size: 10px;
            color: var(--gold-accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            font-weight: bold;
            font-family: sans-serif;
        }

        #capturedText { font-size: 16px; line-height: 1.5; min-height: 35px; color: var(--text-main); }

        .voice-mode-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 5px;
        }
        .gender-option {
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
            transition: 0.3s;
            background: #f9f9f9;
        }
        .gender-option.active {
            background: var(--navy-deep);
            color: var(--gold-accent);
            border-color: var(--navy-deep);
        }

        .mic-btn {
            width: 100%;
            padding: 18px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, var(--navy-deep), #2a3a7c);
            color: var(--gold-accent);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 10px rgba(26, 42, 108, 0.2);
        }
        .mic-btn.active { background: #B21F1F; color: white; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(178, 31, 31, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(178, 31, 31, 0); }
            100% { box-shadow: 0 0 0 0 rgba(178, 31, 31, 0); }
        }

        .selector-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .lang-btn {
            padding: 15px 5px;
            border-radius: 10px;
            border: 1px solid #D1C7B7;
            background: #F9F7F2;
            color: var(--navy-deep);
            font-weight: bold;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .lang-btn:active { background: var(--gold-accent); color: white; }
        .lang-btn span { font-size: 24px; }

        .result-card { border-top: 3px solid var(--gold-accent); flex-grow: 1; display: flex; flex-direction: column; min-height: 120px; }
        #translatedDisplay { font-size: 20px; font-weight: 600; color: var(--navy-deep); line-height: 1.4; flex-grow: 1; overflow-y: auto; }

        .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid #F0EAE0; padding-top: 10px; }
        .audio-btn {
            background: var(--gold-accent); color: white; border: none; padding: 10px 25px; border-radius: 40px; font-weight: bold; font-size: 13px;
        }
        .status-text { font-size: 10px; color: #A09686; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>GLOBAL CONNECT</h1>
    </div>

    <div class="main-content">
        <div class="voice-mode-selector">
            <div id="maleOpt" class="gender-option active" onclick="setGender('male')">👨 男性（Male）</div>
            <div id="femaleOpt" class="gender-option" onclick="setGender('female')">👩 女性（Female）</div>
        </div>

        <div class="mic-section">
            <button id="micBtn" class="mic-btn">🎙️ <span id="micText">TAP TO SPEAK</span></button>
        </div>

        <div class="card">
            <span class="label">Input</span>
            <div id="capturedText">....</div>
        </div>

        <div class="card">
            <span class="label">Translate to</span>
            <div class="selector-grid">
                <button class="lang-btn" onclick="requestTranslation('ja')"><span>🇯🇵</span> JAPANESE</button>
                <button class="lang-btn" onclick="requestTranslation('vi')"><span>🇻🇳</span> VIETNAM</button>
                <button class="lang-btn" onclick="requestTranslation('en')"><span>🇺🇸</span> ENGLISH</button>
            </div>
        </div>

        <div class="card result-card">
            <span class="label">Translation</span>
            <div id="translatedDisplay">....</div>
            <div class="footer-actions">
                <span id="statusBadge" class="status-text">STANDBY</span>
                <button class="audio-btn" onclick="repeatVoice()">🔊 REPLAY</button>
            </div>
        </div>
    </div>
</div>

<script>
    // あなたの最新URLを設定済みです
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxZlZnpfQ4-jKYq1HfqwxxRo5FlQIZGHYu5fg7Ye6cn6x3FtjtVJ0ptxBofVCqzfje3Bw/exec";

    const micBtn = document.getElementById('micBtn');
    const micText = document.getElementById('micText');
    const capturedText = document.getElementById('capturedText');
    const translatedDisplay = document.getElementById('translatedDisplay');
    const statusBadge = document.getElementById('statusBadge');

    let lastTranslatedText = "";
    let lastLang = "";
    let selectedGender = 'male';

    function setGender(gender) {
        selectedGender = gender;
        document.getElementById('maleOpt').classList.toggle('active', gender === 'male');
        document.getElementById('femaleOpt').classList.toggle('active', gender === 'female');
    }

    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.interimResults = true;

    micBtn.onclick = () => {
        recognition.lang = (lastLang === 'vi') ? 'vi-VN' : (lastLang === 'en') ? 'en-US' : 'ja-JP';
        try {
            recognition.start();
            micBtn.classList.add('active');
            micText.innerText = "LISTENING...";
        } catch (e) {}
    };

    recognition.onresult = (event) => {
        capturedText.innerText = event.results[0][0].transcript;
    };

    recognition.onend = () => {
        micBtn.classList.remove('active');
        micText.innerText = "TAP TO SPEAK";
    };

    async function requestTranslation(targetLang) {
        const text = capturedText.innerText;
        if (!text || text === "....") return;

        statusBadge.innerText = "CONNECTING...";
        translatedDisplay.style.opacity = "0.4";

        const url = `${GAS_URL}?text=${encodeURIComponent(text)}&target=${targetLang}`;
        
        try {
            // セキュリティ設定を追加した最新のfetch
            const response = await fetch(url, {
                method: 'GET',
                mode: 'cors'
            });
            
            const data = await response.json();
            
            lastTranslatedText = data.result;
            lastLang = targetLang;
            
            translatedDisplay.innerText = lastTranslatedText;
            translatedDisplay.style.opacity = "1";
            statusBadge.innerText = "COMPLETED";
            
            repeatVoice();
        } catch (e) {
            console.error(e);
            statusBadge.innerText = "NETWORK ERROR";
            translatedDisplay.innerText = "通信エラーが発生しました。GAS側の『新バージョン』としてのデプロイと『全員に公開』設定を再度ご確認ください。";
        }
    }

    function repeatVoice() {
        if (!lastTranslatedText) return;
        window.speechSynthesis.cancel();
        
        const uttr = new SpeechSynthesisUtterance(lastTranslatedText);
        uttr.lang = (lastLang === 'vi') ? 'vi-VN' : (lastLang === 'ja') ? 'ja-JP' : 'en-US';
        
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => {
            const isLang = v.lang.startsWith(uttr.lang.split('-')[0]);
            const name = v.name.toLowerCase();
            if (selectedGender === 'female') {
                return isLang && (name.includes('female') || name.includes('girl') || name.includes('woman') || name.includes('google') || name.includes('kyoko'));
            } else {
                return isLang && (name.includes('male') || name.includes('boy') || name.includes('man'));
            }
        });

        if (voice) uttr.voice = voice;
        uttr.rate = 0.92;
        window.speechSynthesis.speak(uttr);
    }
    
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>

</body>
</html>
